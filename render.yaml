services:
  - type: web
    name: stakeke
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: ./render-build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
