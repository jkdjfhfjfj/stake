<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>StakeKE — Kenya's #1 M-Pesa Investment & Staking Platform</title>
    <meta name="description" content="StakeKE is Kenya's leading M-Pesa investment platform. Deposit via M-Pesa, stake in tiered plans, earn up to 30% ROI, and grow your money in KES. Join thousands of Kenyans investing smarter today." />
    <meta name="keywords" content="M-Pesa investment Kenya, staking platform Kenya, earn money M-Pesa, KES investment, Kenya ROI, online investment Kenya, stake KES, StakeKE, M-Pesa earn, Kenya investment platform" />
    <meta name="author" content="StakeKE" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://stakekenya.co.ke/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stakekenya.co.ke/" />
    <meta property="og:site_name" content="StakeKE" />
    <meta property="og:title" content="StakeKE — Kenya's #1 M-Pesa Investment & Staking Platform" />
    <meta property="og:description" content="Deposit via M-Pesa, stake in tiered plans, earn up to 30% ROI, and grow your money in KES. Kenya's most trusted investment platform." />
    <meta property="og:image" content="https://stakekenya.co.ke/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_KE" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@StakeKE" />
    <meta name="twitter:title" content="StakeKE — Kenya's #1 M-Pesa Investment Platform" />
    <meta name="twitter:description" content="Deposit via M-Pesa, stake in tiered plans, earn up to 30% ROI. Join thousands of Kenyans investing smarter today." />
    <meta name="twitter:image" content="https://stakekenya.co.ke/og-image.png" />

    <!-- Geo targeting Kenya -->
    <meta name="geo.region" content="KE" />
    <meta name="geo.placename" content="Kenya" />
    <meta name="language" content="English" />

    <!-- Structured Data — WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "StakeKE",
      "alternateName": "Stake Kenya",
      "url": "https://stakekenya.co.ke/",
      "description": "Kenya's #1 M-Pesa investment and staking platform. Deposit via M-Pesa, earn ROI on tiered staking plans, and grow your money in KES.",
      "potentialAction": {
        "@type": "RegisterAction",
        "target": "https://stakekenya.co.ke/register"
      }
    }
    </script>

    <!-- Structured Data — FinancialService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "StakeKE",
      "url": "https://stakekenya.co.ke/",
      "logo": "https://stakekenya.co.ke/favicon.svg",
      "description": "Kenya's leading M-Pesa investment platform offering tiered staking plans with competitive ROI in KES.",
      "areaServed": {
        "@type": "Country",
        "name": "Kenya"
      },
      "currenciesAccepted": "KES",
      "paymentAccepted": "M-Pesa"
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
